# openlock default sandbox policy.
#
# T1 threat model: assume the agent is malicious.
# Default-deny egress. Only the endpoints below are reachable.
# Per-binary credential scoping prevents cross-provider leakage.

version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/local/bin/node
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: POST
              path: /v1/**
        cred_inject:
          provider: anthropic
          strip_headers:
            - Authorization
            - x-api-key
            - Cookie
          inject:
            - header: Authorization
              from_credential: ANTHROPIC_BEARER_TOKEN
              value_prefix: 'Bearer '
    allowed_secrets:
      - ANTHROPIC_BEARER_TOKEN
  opencode:
    binaries:
      - path: /usr/local/bin/opencode
      - path: /usr/local/bin/node
    endpoints:
      - host: openrouter.ai
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: POST
              path: /api/v1/**
        cred_inject:
          provider: openrouter
          strip_headers:
            - Authorization
            - x-api-key
            - Cookie
          inject:
            - header: Authorization
              from_credential: OPENROUTER_BEARER_TOKEN
      - host: models.dev
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow:
              method: GET
              path: /**
    allowed_secrets:
      - OPENROUTER_BEARER_TOKEN
  npm_packages:
    binaries:
      - path: /usr/local/bin/npm
      - path: /usr/local/bin/node
      - path: /usr/local/bin/npx
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
        allow_encoded_slash: true
        trust_check:
          registry: npm
    allowed_secrets: []
  python_packages:
    binaries:
      - path: /usr/local/bin/uv
      - path: /usr/local/bin/uvx
      - path: /usr/bin/python3
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
        trust_check:
          registry: pypi
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        access: read-only
        trust_check:
          registry: pypi
    allowed_secrets: []
