# Wire proof policy — no fork-specific fields.
# Tests basic sandbox + proxy + provider credential delivery.

version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  claude_inference:
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/bin/node }
      - { path: /usr/bin/curl }
    endpoints:
      - host: api.anthropic.com
        port: 443
      - host: statsig.anthropic.com
        port: 443
