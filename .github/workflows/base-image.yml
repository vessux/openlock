name: base-image

# Builds the multi-arch (amd64 + arm64) openlock-base image and pushes it to
# ghcr.io/vessux/openlock-base:<hash>, where <hash> = sha256(base.Containerfile)
# [0..12] — the exact tag the host computes in src/sandbox/ensure-base.ts. The
# host tries `<runtime> pull <tag>` before any local build, so a fresh install
# skips the slow apt/node/uv install whenever this image is available.
#
# Trigger: release tags only. A released binary embeds a frozen
# base.Containerfile, so building on the tag guarantees that release's base
# hash exists in ghcr. base.Containerfile changes rarely, so the idempotency
# check skips the (QEMU-emulated, ~10-15 min arm64) build when the tag is
# already present. Manual dispatch is kept as an escape hatch / bootstrap.
#
# ONE-TIME SETUP: the first push creates a PRIVATE ghcr package. Flip
# ghcr.io/vessux/openlock-base to public (GitHub → Packages → Package settings)
# so end users' unauthenticated `podman pull` works. Local build remains the
# fallback for air-gapped users, so this is a performance win, not a hard dep.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: base-image
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  push-base:
    name: Build & push openlock-base
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Compute base tag (same code path as the host)
        id: tag
        run: |
          set -euo pipefail
          TAG="$(bun run src/cli.ts --print-base-tag)"
          echo "Computed base tag: ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if tag already exists
        id: check
        run: |
          set -uo pipefail
          if docker buildx imagetools inspect "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "Image already present in ghcr — skipping build."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image not found — will build & push."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.check.outputs.exists == 'false'

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - name: Build & push (amd64 + arm64)
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/base.Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tag.outputs.tag }}
          # Match the fork-binary trust model (no attestation) and keep the
          # pushed manifest a clean per-arch image index that podman resolves
          # reliably — buildx provenance attestations can trip podman's arch
          # selection.
          provenance: false
