name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Lint (biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests
        run: bun test

      - name: Dead code (knip)
        run: bun run knip

  live-integration:
    # Live end-to-end tests gated behind OPENLOCK_LIVE_INTEGRATION=1 because
    # they build the sandbox image (~minutes first run), start the gateway,
    # and create real containers. Kept off the default `bun test` path so
    # local dev stays fast; this job runs them in CI so they're never
    # silently broken.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Install podman 5.x (heredoc-aware)
        # ubuntu-24.04 ships podman 4.9.3 which mis-parses the shell-heredoc
        # `RUN cat > /sandbox/.claude.json <<'JSON'` block in containers/
        # core.Containerfile. Mac (5.8.2) and Lima (5.4.2) build fine. Pull
        # podman 5.x .deb from the alvistack OBS project (canonical source
        # for current-version containers stack on noble). See bd
        # openlock-sjr.
        run: |
          # Remove ubuntu-shipped podman + buildah and the golang-* helper
          # packages that own files (/etc/containers/policy.json,
          # registries.conf, etc.) which alvistack's containers-common also
          # ships — otherwise dpkg refuses to overwrite. Keep the purge
          # tolerant: not every package is present on every runner image.
          sudo apt-get purge -y podman buildah \
            golang-github-containers-common \
            golang-github-containers-image \
            containers-storage skopeo || true
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL "https://download.opensuse.org/repositories/home:/alvistack/xUbuntu_24.04/Release.key" \
            | sudo gpg --dearmor -o /etc/apt/keyrings/alvistack.gpg
          echo "deb [signed-by=/etc/apt/keyrings/alvistack.gpg] https://download.opensuse.org/repositories/home:/alvistack/xUbuntu_24.04/ /" \
            | sudo tee /etc/apt/sources.list.d/alvistack.list > /dev/null
          sudo apt-get update -qq
          # `--force-overwrite` as belt-and-suspenders: catch any
          # /etc/containers/* file we didn't purge above.
          sudo apt-get install -y \
            -o Dpkg::Options::=--force-overwrite \
            podman podman-gvproxy podman-aardvark-dns podman-netavark
          podman --version

      - name: Extend rootless subuid/subgid range
        # openlock-core images pin sandbox uid 999999 (see containers/
        # core.Containerfile for rationale). GH Actions ubuntu-24.04 ships
        # `runner` with /etc/subuid `runner:165536:65536` — too small for
        # uid 999999, so `podman build` hits `crun: setgroups: Invalid
        # argument` at `USER sandbox`. Widen the range to 1.1M before any
        # podman work, then re-migrate podman's user-namespace state.
        run: |
          # `$USER` must expand in the outer shell, not inside sudo (where it
          # would resolve to root). Pipe + tee handles that cleanly.
          echo "$USER:100000:1100000" | sudo tee /etc/subuid > /dev/null
          echo "$USER:100000:1100000" | sudo tee /etc/subgid > /dev/null
          podman system migrate
          # Surface effective config in the log so future drift is obvious.
          getent passwd "$USER" | cut -d: -f1,3
          grep "^$USER:" /etc/subuid /etc/subgid

      - name: Start rootless podman socket
        # The gateway resolves /run/user/$UID/podman/podman.sock at startup
        # (see resolvePodmanSocket in ensure-gateway.ts), so the runner needs
        # a live podman.socket before the gateway starts.
        run: |
          systemctl --user enable --now podman.socket
          # Verify the socket landed where the gateway expects it.
          podman info --format '{{.Host.RemoteSocket.Path}}'

      - name: Integration tests (OPENLOCK_LIVE_INTEGRATION=1)
        env:
          OPENLOCK_LIVE_INTEGRATION: "1"
        run: bun test tests/integration/
