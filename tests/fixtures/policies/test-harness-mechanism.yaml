# Test-only policy: validates that cred_inject applies to opencode harness
# binaries via a benign synthetic mock endpoint. Synthetic identifiers only.
version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  opencode_mock_test:
    binaries:
      - { path: /usr/local/bin/opencode }
      - { path: /usr/lib/node_modules/opencode-ai/bin/* }
      - { path: /usr/bin/node }
    endpoints:
      - host: mock.openlock.test
        port: 8443
        protocol: rest
        enforcement: enforce
        rules: [{ allow: { method: GET, path: "/**" } }]
        cred_inject:
          provider: test
          strip_headers: [X-Original-Header]
          inject:
            - { header: X-Test-Echo, from_credential: TEST_ECHO_VAL }
    allowed_secrets: [TEST_ECHO_VAL]
