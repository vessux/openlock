# Test-only policy: allows curl to hit the real openrouter.ai endpoint
# with cred_inject swapping a placeholder Bearer for the real bearer
# token. Used by tests/integration/post-create-openrouter-real.test.ts
# to prove the openlock-hnp post-create exec path authenticates with
# the real upstream.
version: 1

filesystem_policy:
  include_workdir: true
  read_only: [/usr, /lib, /proc, /dev/urandom, /app, /etc, /var/log]
  read_write: [/sandbox, /tmp, /dev/null]

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  openrouter_real:
    binaries:
      - { path: /usr/bin/curl }
    endpoints:
      - host: openrouter.ai
        port: 443
        protocol: rest
        enforcement: enforce
        rules: [{ allow: { method: POST, path: "/api/v1/**" } }]
        cred_inject:
          provider: openrouter
          strip_headers: [Authorization, x-api-key, Cookie]
          inject:
            - { header: Authorization, from_credential: OPENROUTER_BEARER_TOKEN }
    allowed_secrets: [OPENROUTER_BEARER_TOKEN]
